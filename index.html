<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘 뭐 먹지?</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="theme-switch-wrapper">
        <button id="theme-toggle">모드 전환</button>
    </div>
    <div class="container">
        <h1 class="main-title">오늘 뭐 먹지? 🍽️</h1>
        <div id="category-buttons">
            <button class="category-btn" data-category="all">아무거나</button>
            <button class="category-btn" data-category="korean">한식</button>
            <button class="category-btn" data-category="chinese">중식</button>
            <button class="category-btn" data-category="japanese">일식</button>
            <button class="category-btn" data-category="western">양식</button>
        </div>
        <button id="suggestionBtn">메뉴 추천 받기</button>
        <p id="foodSuggestion"></p>
        <div id="action-buttons" style="display: none;">
            <button id="cookBtn">요리하기</button>
            <button id="orderBtn">주문하기</button>
        </div>
    </div>

    <div class="menu-management">
        <h2>메뉴 관리</h2>
        <input type="text" id="menu-item-input" placeholder="음식 이름">
        <select id="menu-category-select">
            <option value="korean">한식</option>
            <option value="chinese">중식</option>
            <option value="japanese">일식</option>
            <option value="western">양식</option>
        </select>
        <button id="add-menu-btn">추가</button>
        <button id="remove-menu-btn">삭제</button>
    </div>

    <script src="main.js"></script>
</body>
</html>
